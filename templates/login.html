<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROSIE — {{ family_name }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #2c3e50; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      text-align: center;
      letter-spacing: 2px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #2c3e50; }
    button {
      width: 100%;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3d5166; }
    .error {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🤖</div>
    <h1>ROSIE</h1>
    <div class="subtitle">{{ family_name }}</div>
    <form method="POST">
      <input type="password" name="pin" placeholder="Enter family PIN" autofocus autocomplete="off">
      <button type="submit">Let me in</button>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
    </form>
  </div>
</body>
</html>
